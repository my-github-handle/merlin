{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "merlin.fullname" . }}
  labels: {{- include "merlin.labels" . | nindent 4 }}
  annotations: {{- toYaml .Values.ingress.annotations | nindent 4 }}
  # IMPORTANT: For nginx ingress, large layer uploads require unlimited body size.
  # Add the following annotation via .Values.ingress.annotations:
  #   nginx.ingress.kubernetes.io/proxy-body-size: "0"
  # Without this, large docker push operations will be truncated and fail.
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  tls:
    - hosts: [{{ .Values.ingress.host | quote }}]
      secretName: {{ .Values.ingress.tlsSecretName }}
    {{- if and .Values.ingress.dashboardHost (ne (lower .Values.merlin.server.dashboardAddr) "off") }}
    - hosts: [{{ .Values.ingress.dashboardHost | quote }}]
      secretName: {{ .Values.ingress.dashboardTLSSecretName | default .Values.ingress.tlsSecretName }}
    {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "merlin.fullname" . }}
                port: { number: {{ .Values.service.port }} }
    {{- if and .Values.ingress.dashboardHost (ne (lower .Values.merlin.server.dashboardAddr) "off") }}
    # Dashboard on its own host: it serves "/" (pages + /static + /api/dashboard),
    # which would collide with the v2 catch-all above on a shared host.
    # WARNING: the dashboard has NO application-level auth and exposes who pushed
    # what + vulnerability posture. Only set ingress.dashboardHost if that host is
    # itself access-controlled (internal-only ingress, IP allowlist, or an auth
    # proxy in front). Leave it empty to keep the dashboard cluster-internal.
    - host: {{ .Values.ingress.dashboardHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "merlin.fullname" . }}
                port: { number: {{ .Values.dashboard.port }} }
    {{- end }}
{{- end }}
