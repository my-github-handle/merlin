{{define "layout"}}<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Merlin · Gate Dashboard</title>
<link rel="stylesheet" href="/static/app.css">
</head><body>
<header class="topbar">
  <a class="logo" href="/?range={{.Range}}">merlin<span class="dot">●</span> <span class="muted">gate dashboard</span></a>
  <form class="rangebox" method="get" action="/">
    {{range .Ranges}}<button name="range" value="{{.}}" class="range {{if eq . $.Range}}on{{end}}">{{.}}</button>{{end}}
  </form>
  <form class="search" method="get" action="/report"><input name="ref" placeholder="repo:tag or repo@sha256…"></form>
</header>
<main>{{template "content" .}}</main>
<script src="/static/app.js"></script>
</body></html>{{end}}
