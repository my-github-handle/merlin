{{- if .Values.valkey.enabled }}
apiVersion: hyperspike.io/v1
kind: Valkey
metadata:
  name: {{ include "merlin.fullname" . }}-valkey
  labels: {{- include "merlin.labels" . | nindent 4 }}
spec:
  # Field names verified against the hyperspike.io/v1 CRD (valkey-operator v0.0.61)
  # via `kubectl explain valkey.spec`. anonymousAuth / clusterDomain / prometheus /
  # serviceMonitor / volumePermissions are REQUIRED by the CRD schema.
  nodes: {{ .Values.valkey.nodes }}
  tls: {{ .Values.valkey.tls }}
  anonymousAuth: {{ .Values.valkey.anonymousAuth }}
  clusterDomain: {{ .Values.valkey.clusterDomain | quote }}
  prometheus: {{ .Values.valkey.prometheus }}
  serviceMonitor: {{ .Values.valkey.serviceMonitor }}
  volumePermissions: {{ .Values.valkey.volumePermissions }}
  storage:
    spec:
      accessModes: [ReadWriteOnce]
      resources:
        requests:
          storage: {{ .Values.valkey.storage.size }}
      {{- with .Values.valkey.storage.storageClassName }}
      storageClassName: {{ . }}
      {{- end }}
{{- end }}
