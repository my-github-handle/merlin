{{- if .Values.ingress.enabled }}
{{- $dashOn := ne (lower .Values.merlin.server.dashboardAddr) "off" }}
{{- $pathRoute := and .Values.ingress.dashboardPathRouting $dashOn }}
{{- $dashHost := and .Values.ingress.dashboardHost $dashOn }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "merlin.fullname" . }}
  labels: {{- include "merlin.labels" . | nindent 4 }}
  annotations: {{- toYaml .Values.ingress.annotations | nindent 4 }}
  # IMPORTANT: For nginx ingress, large layer uploads require unlimited body size.
  # Add the following annotation via .Values.ingress.annotations:
  #   nginx.ingress.kubernetes.io/proxy-body-size: "0"
  # Without this, large docker push operations will be truncated and fail.
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  tls:
    - hosts: [{{ .Values.ingress.host | quote }}]
      secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          {{- if $pathRoute }}
          # Path-routed shared host: only the Docker Registry V2 surface stays on
          # the gate (:5000) so `docker push`/`pull` is unaffected. Everything else
          # is served by the SEPARATE dashboard Ingress below (the dashboard backend
          # needs its own health probe — path "/", status 200 — because this Ingress
          # carries the gate's /v2/-401 probe annotations, which the dashboard fails).
          - path: /v2
            pathType: Prefix
            backend:
              service:
                name: {{ include "merlin.fullname" . }}
                port: { number: {{ .Values.service.port }} }
          - path: /token
            pathType: Prefix
            backend:
              service:
                name: {{ include "merlin.fullname" . }}
                port: { number: {{ .Values.service.port }} }
          - path: /reports
            pathType: Prefix
            backend:
              service:
                name: {{ include "merlin.fullname" . }}
                port: { number: {{ .Values.service.port }} }
          {{- else }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "merlin.fullname" . }}
                port: { number: {{ .Values.service.port }} }
          {{- end }}
{{- if or $pathRoute $dashHost }}
{{- $dhost := .Values.ingress.host }}{{- if $dashHost }}{{ $dhost = .Values.ingress.dashboardHost }}{{- end }}
---
# Separate Ingress for the dashboard backend (:8080). It MUST be its own resource
# so the ingress controller derives a dashboard-appropriate health probe (path "/",
# status 200) for the :8080 backend instead of inheriting the gate's /v2/-401 probe
# (which the dashboard fails -> 502). Annotations come from ingress.dashboardAnnotations.
# WARNING: the dashboard has NO application-level auth. In path-routing mode it shares
# the public registry host, exposing vulnerability posture + push activity to anyone
# who can reach it. Enable only behind an access-controlled ingress.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "merlin.fullname" . }}-dashboard
  labels: {{- include "merlin.labels" . | nindent 4 }}
  annotations: {{- toYaml .Values.ingress.dashboardAnnotations | nindent 4 }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  tls:
    - hosts: [{{ $dhost | quote }}]
      secretName: {{ .Values.ingress.dashboardTLSSecretName | default .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ $dhost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "merlin.fullname" . }}
                port: { number: {{ .Values.dashboard.port }} }
{{- end }}
{{- end }}
